name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-omniwrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build hatch-vcs

      - name: Build omniwrap
        run: python -m build packages/omniwrap/

      - name: Smoke test omniwrap
        run: |
          pip install packages/omniwrap/dist/*.whl
          python -c "import omniwrap; print('omniwrap imported OK')"

      - name: Publish omniwrap to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: packages/omniwrap/dist/
          attestations: false

  publish-omniray:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    needs: publish-omniwrap
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build hatch-vcs

      - name: Build omniray
        run: python -m build packages/omniray/

      - name: Smoke test omniray
        run: |
          pip install packages/omniray/dist/*.whl
          python -c "import omniray; print('omniray imported OK')"

      - name: Publish omniray to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: packages/omniray/dist/
          attestations: false
