name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish-omniwrap:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build hatch-vcs

      - name: Build omniwrap
        run: python -m build packages/omniwrap/

      - name: Publish omniwrap to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: packages/omniwrap/dist/

  publish-omniray:
    runs-on: ubuntu-latest
    environment: pypi
    needs: publish-omniwrap

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build hatch-vcs

      - name: Build omniray
        run: python -m build packages/omniray/

      - name: Publish omniray to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: packages/omniray/dist/
