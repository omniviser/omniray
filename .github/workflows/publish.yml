name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-omniwrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build hatch-vcs

      - name: Build omniwrap
        run: python -m build packages/omniwrap/

      - name: Smoke test omniwrap
        run: |
          pip install packages/omniwrap/dist/*.whl
          python -c "import omniwrap; print('omniwrap imported OK')"

      - name: Publish omniwrap to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: packages/omniwrap/dist/
          attestations: false

  publish-omniray:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    needs: publish-omniwrap
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build hatch-vcs

      - name: Build omniray
        run: python -m build packages/omniray/

      - name: Smoke test omniray
        run: |
          pip install packages/omniray/dist/*.whl
          python -c "import omniray; print('omniray imported OK')"

      - name: Publish omniray to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: packages/omniray/dist/
          attestations: false
