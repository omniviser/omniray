name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Sync workspace
        run: uv sync --all-extras --all-packages

      - name: Test omniwrap
        run: uv run --directory packages/omniwrap pytest tests/ -v --cov=omniwrap --cov-report=xml --cov-fail-under=100

      - name: Test omniray
        run: uv run --directory packages/omniray pytest tests/ -v --cov=omniray --cov-report=xml --cov-fail-under=100

  test-minimum-versions:
    name: Test minimum dependency versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Sync workspace (min versions)
        run: uv sync --all-extras --all-packages --resolution=lowest-direct

      - name: Test omniwrap
        run: uv run --directory packages/omniwrap pytest tests/ -v

      - name: Test omniray
        run: uv run --directory packages/omniray pytest tests/ -v
