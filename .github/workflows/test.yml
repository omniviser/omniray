name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install omniwrap
        run: |
          cd packages/omniwrap
          uv pip install -e ".[dev]" --system

      - name: Test omniwrap
        run: |
          cd packages/omniwrap
          uv run pytest tests/ -v --cov=omniwrap --cov-report=xml --cov-fail-under=100

      - name: Install omniray
        run: |
          cd packages/omniray
          uv pip install -e ".[dev]" --system

      - name: Test omniray
        run: |
          cd packages/omniray
          uv run pytest tests/ -v --cov=omniray --cov-report=xml --cov-fail-under=100

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        uses: codecov/codecov-action@v5
        with:
          files: packages/omniwrap/coverage.xml,packages/omniray/coverage.xml
          fail_ci_if_error: false

  test-minimum-versions:
    name: Test minimum dependency versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install omniwrap (min versions)
        run: |
          cd packages/omniwrap
          uv pip install -e ".[dev]" --system --resolution=lowest-direct

      - name: Test omniwrap
        run: |
          cd packages/omniwrap
          uv run pytest tests/ -v

      - name: Install omniray (min versions)
        run: |
          cd packages/omniray
          uv pip install -e ".[dev]" --system --resolution=lowest-direct

      - name: Test omniray
        run: |
          cd packages/omniray
          uv run pytest tests/ -v
