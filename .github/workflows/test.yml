name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Sync workspace
        run: uv sync --all-extras --all-packages

      - name: Test omniwrap
        run: uv run --directory packages/omniwrap pytest tests/ -v --cov=omniwrap --cov-report=xml --cov-fail-under=100

      - name: Test omniray
        run: uv run --directory packages/omniray pytest tests/ -v --cov=omniray --cov-report=xml --cov-fail-under=100

  test-minimum-versions:
    name: Test minimum dependency versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Sync workspace (min versions)
        run: uv sync --all-extras --all-packages --resolution=lowest-direct

      - name: Test omniwrap
        run: uv run --directory packages/omniwrap pytest tests/ -v

      - name: Test omniray
        run: uv run --directory packages/omniray pytest tests/ -v
