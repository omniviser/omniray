name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install and test omniwrap
        run: |
          cd packages/omniwrap
          uv pip install -e ".[dev]" --system
          uv run pytest tests/ -v --cov=omniwrap --cov-report=xml

      - name: Install and test omniray
        run: |
          cd packages/omniray
          uv pip install -e ".[dev]" --system
          uv run pytest tests/ -v --cov=omniray --cov-report=xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
