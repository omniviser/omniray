name: License Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  license-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install packages and pip-licenses
        run: |
          uv pip install pip-licenses --system
          cd packages/omniwrap && uv pip install -e . --system && cd ../..
          cd packages/omniray && uv pip install -e . --system

      - name: Check licenses
        run: |
          pip-licenses \
            --allow-only "MIT;MIT License;BSD License;BSD-2-Clause;BSD-3-Clause;Apache-2.0;Apache-2.0 OR BSD-2-Clause;Apache Software License;ISC License (ISCL);Python Software Foundation License;PSF-2.0;Mozilla Public License 2.0 (MPL 2.0)" \
            --fail-on "GPL;AGPL;LGPL" \
            --format=plain
