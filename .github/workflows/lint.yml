name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Sync workspace
        run: uv sync --all-extras --all-packages

      - name: Ruff check
        run: uv run ruff check packages/

      - name: Ruff format
        run: uv run ruff format --check packages/

      - name: MyPy omniwrap
        run: uv run --directory packages/omniwrap mypy omniwrap/

      - name: MyPy omniray
        run: uv run --directory packages/omniray mypy omniray/

      - name: Shamefile check
        run: uv run shame me . --dry-run
