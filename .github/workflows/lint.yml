name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        run: |
          uv pip install ruff mypy --system
          cd packages/omniwrap && uv pip install -e . --system && cd ../..
          cd packages/omniray && uv pip install -e ".[otel]" --system

      - name: Ruff check
        run: ruff check packages/

      - name: Ruff format
        run: ruff format --check packages/

      - name: MyPy omniwrap
        run: cd packages/omniwrap && mypy omniwrap/

      - name: MyPy omniray
        run: cd packages/omniray && mypy omniray/
