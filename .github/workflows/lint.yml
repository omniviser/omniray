name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Sync workspace
        run: uv sync --all-extras --all-packages

      - name: Ruff check
        run: uv run ruff check packages/

      - name: Ruff format
        run: uv run ruff format --check packages/

      - name: MyPy omniwrap
        run: uv run --directory packages/omniwrap mypy omniwrap/

      - name: MyPy omniray
        run: uv run --directory packages/omniray mypy omniray/

      - name: Shamefile check
        run: uv run shame me . --dry-run
