name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Sync workspace
        run: uv sync --all-extras --all-packages

      - name: Ruff check
        run: uv run ruff check packages/

      - name: Ruff format
        run: uv run ruff format --check packages/

      - name: MyPy omniwrap
        run: uv run --directory packages/omniwrap mypy omniwrap/

      - name: MyPy omniray
        run: uv run --directory packages/omniray mypy omniray/

      - name: Shamefile check
        run: uv run shame me . --dry-run
