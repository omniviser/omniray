name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Sync workspace
        run: uv sync --all-extras --all-packages

      - name: Ruff check
        run: uv run ruff check packages/

      - name: Ruff format
        run: uv run ruff format --check packages/

      - name: MyPy omniwrap
        run: uv run --directory packages/omniwrap mypy omniwrap/

      - name: MyPy omniray
        run: uv run --directory packages/omniray mypy omniray/

      - name: Shamefile check
        run: uv run shame me . --dry-run
