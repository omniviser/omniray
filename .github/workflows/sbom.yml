name: SBOM

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-omniwrap.spdx.json
          output-file: sbom-omniwrap.spdx.json
          path: packages/omniwrap/

      - uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-omniray.spdx.json
          output-file: sbom-omniray.spdx.json
          path: packages/omniray/

      - name: Attach SBOMs to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG_NAME" sbom-omniwrap.spdx.json sbom-omniray.spdx.json
