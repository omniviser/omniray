name: SBOM

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: sbom-omniwrap.spdx.json
          output-file: sbom-omniwrap.spdx.json
          path: packages/omniwrap/

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: sbom-omniray.spdx.json
          output-file: sbom-omniray.spdx.json
          path: packages/omniray/
