name: SBOM

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-omniwrap.spdx.json
          output-file: sbom-omniwrap.spdx.json
          path: packages/omniwrap/

      - uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-omniray.spdx.json
          output-file: sbom-omniray.spdx.json
          path: packages/omniray/
