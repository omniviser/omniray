[project]
name = "omniwrap"
dynamic = ["version"]
description = "Automatically wrap every function and method in your codebase."
requires-python = ">=3.12"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
readme = "README.md"
keywords = [
    "wrapping",
    "monkey-patching",
    "instrumentation",
    "tracing",
    "observability",
    "monitoring",
    "apm",
    "decorator",
    "logging"
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries",
    "Topic :: System :: Monitoring",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Natural Language :: English",
    "Typing :: Typed",
]
dependencies = ["wrapt>=1.14"]
authors = [
    { name = "Bartlomiej Flis", email = "Bartekdawidflis@gmail.com" },
    { name = "OMNIVISER SP. Z O.O.", email = "info@omniviser.ai" },
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-mock>=3.14", "pytest-cov>=6.0"]

[project.urls]
Homepage = "https://github.com/omniviser/omniray"
Repository = "https://github.com/omniviser/omniray"
Issues = "https://github.com/omniviser/omniray/issues"
Changelog = "https://github.com/omniviser/omniray/blob/main/CHANGELOG.md"

[tool.hatch.version]
source = "vcs"
raw-options = { root = "../.." }
fallback-version = "1.0.0"

[tool.hatch.build.targets.wheel]
packages = ["omniwrap"]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"
